<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pengimbas Kod QR RELA</title>
  
  <!-- Tailwind CSS & Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- QR Code Scanning Engine -->
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #0f172a;
      color: #f1f5f9;
      -webkit-tap-highlight-color: transparent;
    }
    .glass-card {
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    }
    #reader {
      width: 100%;
      border-radius: 1.5rem;
      overflow: hidden;
      border: none !important;
    }
    #reader video {
      object-fit: cover !important;
      border-radius: 1.5rem;
      min-height: 320px;
    }
    /* Sembunyikan elemen dashboard default library */
    #reader__dashboard_section_csr span, 
    #reader__dashboard_section_swaplink {
      display: none !important;
    }
    @keyframes scan {
      0% { top: 0; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    .laser-line {
      animation: scan 2s ease-in-out infinite;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col p-4 sm:p-6 justify-center items-center">

  <!-- Main Container -->
  <main class="w-full max-w-md flex flex-col gap-6">
    
    <!-- Header -->
    <header class="text-center">
      <div class="w-16 h-16 bg-gradient-to-br from-blue-600 to-indigo-800 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-500/20 rotate-3">
        <i class="fas fa-qrcode text-white text-2xl animate-pulse"></i>
      </div>
      <h1 class="text-xl font-extrabold tracking-tight text-white uppercase">Pengimbas QR Sempadan</h1>
      <p class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mt-1">RELA DAERAH BATU PAHAT</p>
    </header>

    <!-- Scanner Box -->
    <div class="glass-card rounded-[2.5rem] p-4 relative overflow-hidden">
      <!-- Viewfinder Area -->
      <div class="relative bg-slate-950 rounded-3xl overflow-hidden shadow-inner aspect-square flex items-center justify-center mb-4 border-2 border-slate-700">
        
        <!-- Video Feed -->
        <div id="reader" class="w-full h-full bg-black"></div>
        
        <!-- Scanning Laser Overlay -->
        <div class="absolute inset-0 pointer-events-none z-10 border-2 border-emerald-500/20 rounded-3xl overflow-hidden">
          <div class="w-full h-1 bg-emerald-500 shadow-[0_0_15px_3px_rgba(16,185,129,0.5)] absolute top-0 left-0 laser-line"></div>
        </div>
      </div>

      <!-- Controls -->
      <div class="flex gap-3">
        <!-- Kamera Lens Switcher -->
        <button onclick="switchCameraJS()" class="flex-1 py-4 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl font-black text-xs uppercase tracking-widest transition-colors border border-slate-700 flex items-center justify-center gap-2">
          <i class="fas fa-camera-rotate text-sm text-emerald-400"></i> Tukar Kamera
        </button>
      </div>
    </div>

    <!-- Result / Status Card -->
    <div class="glass-card rounded-[2rem] p-5 border border-slate-800 text-center">
      <h3 class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">Status Penyelarian</h3>
      
      <div id="statusText" class="text-xs font-bold uppercase tracking-wide text-slate-300 py-1">
        Menunggu kod QR dikesan...
      </div>
    </div>

    <!-- History Log Card -->
    <div class="glass-card rounded-[2rem] p-5 border border-slate-800">
      <h3 class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-3">Sejarah Sesi Imbasan</h3>
      
      <div id="historyList" class="space-y-2 max-h-32 overflow-y-auto pr-1">
        <div class="text-center py-4 text-[10px] font-bold text-slate-500 uppercase">
          Tiada rekod imbasan dalam sesi ini
        </div>
      </div>
    </div>

  </main>

  <script>
    // Membaca URL Apps Script secara dinamik daripada query parameter pelayar
    const params = new URLSearchParams(window.location.search);
    const APPS_SCRIPT_URL = params.get('api');

    const scanHistory = [];
    let lastScan = '';
    let lastScanTime = 0;
    let html5QrCode = null;
    let availableCameras = [];
    let currentCameraIndex = 0;

    // Inisialisasi Audio Context untuk Beep
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep() {
      try {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 1000; // 1kHz
        gain.gain.value = 0.2;
        osc.start();
        osc.stop(audioCtx.currentTime + 0.12);
      } catch(e) {}
    }

    // Hantar data QR ke doPost(e) Web App GAS
    async function sendToAppsScript(barcode) {
      const statusEl = document.getElementById('statusText');
      statusEl.className = 'text-xs font-black uppercase tracking-wide text-amber-500 animate-pulse';
      statusEl.textContent = 'Menghantar ke Google Sheet...';

      if (!APPS_SCRIPT_URL) {
        statusEl.className = 'text-xs font-black uppercase tracking-wide text-rose-500';
        statusEl.textContent = 'Ralat: URL Web App Tidak Sah!';
        return;
      }

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors', // Melepaskan Cross-Origin Block (Opaque response)
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ barcode: barcode, scanDateObj: new Date().toISOString() })
        });
        
        statusEl.className = 'text-xs font-black uppercase tracking-wide text-emerald-500';
        statusEl.textContent = 'Kehadiran Berjaya Direkodkan!';
        
        // Kemaskini Log
        scanHistory.unshift({ barcode, time: new Date().toLocaleTimeString() });
        updateHistoryUI();
        
      } catch (err) {
        statusEl.className = 'text-xs font-black uppercase tracking-wide text-rose-500';
        statusEl.textContent = 'Ralat Hantaran: ' + err.message;
      }
    }

    function updateHistoryUI() {
      const listEl = document.getElementById('historyList');
      if (scanHistory.length === 0) {
        listEl.innerHTML = '<div class="text-center py-4 text-[10px] font-bold text-slate-500 uppercase">Tiada rekod imbasan</div>';
        return;
      }
      listEl.innerHTML = scanHistory.map(item => `
        <div class="bg-slate-800/40 p-3 border border-slate-700/50 rounded-xl flex items-center justify-between text-xs font-bold text-slate-300">
          <span class="truncate pr-4">${item.barcode}</span>
          <span class="text-slate-500 text-[10px] tracking-widest">${item.time}</span>
        </div>
      `).join('');
    }

    // Berjaya Imbas QR
    function onScanSuccess(decodedText) {
      const now = Date.now();
      // 3 Saat Cooldown untuk kod yang sama
      if (decodedText === lastScan && now - lastScanTime < 3000) return;
      
      lastScan = decodedText;
      lastScanTime = now;

      playBeep();
      sendToAppsScript(decodedText);
    }

    // Memulakan pengimbas kamera
    async function startScanner() {
      try {
        html5QrCode = new Html5Qrcode("reader");
        availableCameras = await Html5Qrcode.getCameras();
        
        if (availableCameras && availableCameras.length > 0) {
          currentCameraIndex = availableCameras.length - 1; // Pilih kamera belakang secara lalai
          await html5QrCode.start(
            availableCameras[currentCameraIndex].id,
            { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
            onScanSuccess
          );
        } else {
          document.getElementById('statusText').textContent = "Kamera tidak dikesan pada peranti.";
          document.getElementById('statusText').className = "text-xs font-black uppercase text-rose-500";
        }
      } catch (err) {
        document.getElementById('statusText').textContent = "Ralat Kamera: " + err;
        document.getElementById('statusText').className = "text-xs font-black uppercase text-rose-500";
      }
    }

    // Tukar Lens Kamera
    async function switchCameraJS() {
      if (availableCameras.length > 1 && html5QrCode) {
        await html5QrCode.stop();
        currentCameraIndex = (currentCameraIndex + 1) % availableCameras.length;
        await html5QrCode.start(
          availableCameras[currentCameraIndex].id,
          { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
          onScanSuccess
        );
      }
    }

    // Mula pemuatan pengimbas sejurus halaman dibuka
    window.onload = function() {
      startScanner();
    }
  </script>
</body>
</html>
